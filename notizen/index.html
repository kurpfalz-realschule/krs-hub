<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KRS Notizen & Aufgaben</title>
<style>
  :root{--accent:#2563eb;--accent2:#1d4ed8;--ink:#1e293b;--muted:#64748b;--bg:#f1f5f9;--card:#fff;
    --line:#e2e8f0;--green:#16a34a;--amber:#d97706;--danger:#dc2626;--radius:12px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font:15px/1.5 var(--font);color:var(--ink);background:var(--bg);min-height:100vh;min-height:100dvh}
  button{font:inherit;cursor:pointer}
  .top{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:30}
  .top h1{font-size:18px;font-weight:800;display:flex;align-items:center;gap:8px}
  .top .who{font-size:12px;opacity:.9;margin-top:2px}
  .tabs{display:flex;gap:6px;background:rgba(255,255,255,.16);border-radius:10px;padding:3px;margin-top:10px;max-width:320px}
  .tabs button{flex:1;border:none;background:none;color:#fff;padding:8px;border-radius:8px;font-weight:600;min-height:40px}
  .tabs button.on{background:#fff;color:#2563eb}
  .wrap{max-width:820px;margin:0 auto;padding:14px 12px 40px}
  .filterbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:12px}
  .filterbar .lbl{font-size:12px;color:var(--muted);margin-right:2px}
  .tag{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--line);background:#fff;color:#334155;
    border-radius:16px;padding:4px 10px;font-size:12.5px;min-height:32px}
  .tag.sel{background:var(--accent);border-color:var(--accent);color:#fff}
  .tag.clear{color:var(--danger);border-color:#fecaca;background:#fff}
  .addcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin-bottom:14px}
  .addcard input,.addcard textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font:14px var(--font);margin-bottom:8px}
  .addcard textarea{resize:vertical;min-height:60px}
  .addrow{display:flex;gap:8px;flex-wrap:wrap}
  .addrow input{flex:1;min-width:120px;margin-bottom:0}
  .btn{min-height:44px;padding:0 16px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:600}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent2)}
  .btn.sm{min-height:34px;padding:0 10px;font-size:13px;font-weight:500}
  .btn.danger{color:var(--danger);border-color:#fecaca}
  .note{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:10px}
  .note.pin{border-color:#fcd34d;box-shadow:0 0 0 1px #fcd34d inset}
  .note h3{font-size:15.5px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
  .note .body{font-size:14px;color:#334155;white-space:pre-wrap;word-break:break-word}
  .note .foot{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
  .note .tags{display:flex;gap:5px;flex-wrap:wrap}
  .note .acts{display:flex;gap:6px}
  .task{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
  .task input[type=checkbox]{width:22px;height:22px;margin-top:2px;accent-color:var(--green);flex:0 0 auto}
  .task .main{flex:1;min-width:0}
  .task .ttl{font-weight:600}
  .task.done .ttl{text-decoration:line-through;color:var(--muted)}
  .task .meta{font-size:12px;color:var(--muted);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .due{color:var(--amber);font-weight:600}.due.over{color:var(--danger)}
  .empty{text-align:center;color:var(--muted);padding:30px 10px;font-size:14px}
  .notice{background:#fffbeb;border:1px solid #fde68a;color:#92400e;border-radius:10px;padding:12px;margin-bottom:12px;font-size:13.5px}
  .login{max-width:340px;margin:40px auto;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px}
  .login h2{font-size:17px;margin-bottom:6px}.login p{font-size:13px;color:var(--muted);margin-bottom:14px}
  .login input{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font:14px var(--font);margin-bottom:8px}
  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 18px;border-radius:22px;font-size:14px;z-index:100;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.on{opacity:1}
  .demo-pill{position:fixed;right:10px;bottom:10px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:14px;padding:3px 10px;font-size:11px;font-weight:700;z-index:40}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10.19.3';
import { useState, useEffect, useMemo, useCallback, useRef } from 'https://esm.sh/preact@10.19.3/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

const CONFIG = {
  SUPABASE_URL: 'https://ooejsfixxiuobrpqgfqm.supabase.co',
  SUPABASE_ANON_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9vZWpzZml4eGl1b2JycHFnZnFtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjQ5MDYsImV4cCI6MjA4OTYwMDkwNn0.GbAv-sB4B8nNE3IPfiYIjbkMKs0Aq03c_-TUcmFY_5s'
};
const params = new URLSearchParams(location.search);
const DEMO = params.get('forceMode') === 'demo';

function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('on'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('on'),1800); }

// #hashtags aus Text ziehen + mit manuellen Tags mischen, normalisiert
function extractTags(text, manual){
  const out = new Set();
  (manual||'').split(/[\s,]+/).forEach(t=>{ const s=t.replace(/^#/,'').trim().toLowerCase(); if(s) out.add(s); });
  const re = /#([\p{L}0-9_\-]{1,30})/gu; let m;
  while((m = re.exec(text||''))) out.add(m[1].toLowerCase());
  return Array.from(out);
}
function fmtDate(d){ if(!d) return ''; try{ return new Date(d+'T00:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }catch(e){ return d; } }
function isOverdue(d){ if(!d) return false; return d < new Date().toISOString().slice(0,10); }

// ── DataService: Demo (in-memory) ODER Supabase ──
function makeDemoService(){
  let notes = [
    { id: 1, title: 'Elternabend 7a vorbereiten', body: 'Folien + Notenübersicht. #musik #klasse7a #orga', tags:['musik','klasse7a','orga'], pinned:true, updated_at:new Date().toISOString() },
    { id: 2, title: 'Idee Projektwoche', body: 'Bandprojekt mit Klasse 9. #musik #projekt', tags:['musik','projekt'], pinned:false, updated_at:new Date().toISOString() }
  ];
  let tasks = [
    { id: 1, title: 'Arbeitsblätter kopieren', done:false, due:new Date().toISOString().slice(0,10), tags:['informatik'], updated_at:new Date().toISOString() },
    { id: 2, title: 'Zeugnisnoten eintragen', done:false, due:null, tags:['orga'], updated_at:new Date().toISOString() },
    { id: 3, title: 'Instrumente zurückräumen', done:true, due:null, tags:['musik'], updated_at:new Date().toISOString() }
  ];
  let nId=3, tId=4;
  const clone=x=>JSON.parse(JSON.stringify(x));
  return {
    demo:true,
    async session(){ return { user:{ email:'demo@realschule-schriesheim.de' } }; },
    async listNotes(){ return clone(notes).sort((a,b)=> (b.pinned-a.pinned) || (b.updated_at>a.updated_at?1:-1)); },
    async addNote(n){ notes.push({ id:++nId, ...n, updated_at:new Date().toISOString() }); },
    async updateNote(id,patch){ const x=notes.find(z=>z.id===id); if(x)Object.assign(x,patch,{updated_at:new Date().toISOString()}); },
    async deleteNote(id){ notes = notes.filter(z=>z.id!==id); },
    async listTasks(){ return clone(tasks).sort((a,b)=> (a.done-b.done) || (b.updated_at>a.updated_at?1:-1)); },
    async addTask(t){ tasks.push({ id:++tId, done:false, ...t, updated_at:new Date().toISOString() }); },
    async updateTask(id,patch){ const x=tasks.find(z=>z.id===id); if(x)Object.assign(x,patch,{updated_at:new Date().toISOString()}); },
    async deleteTask(id){ tasks = tasks.filter(z=>z.id!==id); }
  };
}

async function makeSupabaseService(){
  const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
  const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  return {
    demo:false, sb,
    async session(){ const { data } = await sb.auth.getSession(); return data.session; },
    async signIn(email,pw){ const { error } = await sb.auth.signInWithPassword({ email, password: pw }); if(error) throw error; },
    async listNotes(){ const { data, error } = await sb.from('notes').select('*').order('pinned',{ascending:false}).order('updated_at',{ascending:false}); if(error)throw error; return data||[]; },
    async addNote(n){ const { error } = await sb.from('notes').insert(n); if(error)throw error; },
    async updateNote(id,patch){ const { error } = await sb.from('notes').update(patch).eq('id',id); if(error)throw error; },
    async deleteNote(id){ const { error } = await sb.from('notes').delete().eq('id',id); if(error)throw error; },
    async listTasks(){ const { data, error } = await sb.from('tasks').select('*').order('done',{ascending:true}).order('updated_at',{ascending:false}); if(error)throw error; return data||[]; },
    async addTask(t){ const { error } = await sb.from('tasks').insert(t); if(error)throw error; },
    async updateTask(id,patch){ const { error } = await sb.from('tasks').update(patch).eq('id',id); if(error)throw error; },
    async deleteTask(id){ const { error } = await sb.from('tasks').delete().eq('id',id); if(error)throw error; }
  };
}

function TagBar({ all, sel, onToggle, onClear }){
  if(!all.length) return null;
  return html`<div class="filterbar" data-testid="tagbar">
    <span class="lbl">Filter:</span>
    ${all.map(t => html`<button class=${'tag'+(sel===t?' sel':'')} onClick=${()=>onToggle(t)}>#${t}</button>`)}
    ${sel && html`<button class="tag clear" onClick=${onClear}>✕ Filter</button>`}
  </div>`;
}

function Notizen({ svc }){
  const [notes,setNotes]=useState([]);
  const [title,setTitle]=useState(''); const [body,setBody]=useState(''); const [tagsIn,setTagsIn]=useState('');
  const [sel,setSel]=useState(''); const [editId,setEditId]=useState(0);
  const load=useCallback(()=>{ svc.listNotes().then(setNotes).catch(e=>toast(e.message)); },[svc]);
  useEffect(()=>{ load(); },[load]);
  const allTags=useMemo(()=>{ const s=new Set(); notes.forEach(n=>(n.tags||[]).forEach(t=>s.add(t))); return Array.from(s).sort(); },[notes]);
  const shown=useMemo(()=> sel ? notes.filter(n=>(n.tags||[]).includes(sel)) : notes,[notes,sel]);
  const save=()=>{ if(!title.trim()&&!body.trim()){ toast('Bitte Titel oder Text'); return; }
    const tags=extractTags(body,tagsIn);
    svc.addNote({ title:title.trim(), body:body.trim(), tags, pinned:false }).then(()=>{ setTitle('');setBody('');setTagsIn(''); toast('Notiz gespeichert ✓'); load(); }).catch(e=>toast(e.message)); };
  const saveEdit=(n)=>{ const tags=extractTags(n.body,''); svc.updateNote(n.id,{ title:n.title, body:n.body, tags }).then(()=>{ setEditId(0); toast('Gespeichert'); load(); }).catch(e=>toast(e.message)); };
  return html`<div>
    <div class="addcard">
      <input placeholder="Titel" value=${title} onInput=${e=>setTitle(e.target.value)} data-testid="note-title"/>
      <textarea placeholder="Text … (nutze #tags direkt im Text, z. B. #musik #klasse7a)" value=${body} onInput=${e=>setBody(e.target.value)} data-testid="note-body"></textarea>
      <div class="addrow">
        <input placeholder="Tags (optional, kommagetrennt)" value=${tagsIn} onInput=${e=>setTagsIn(e.target.value)} data-testid="note-tags"/>
        <button class="btn primary" onClick=${save} data-testid="note-add">＋ Notiz</button>
      </div>
    </div>
    <${TagBar} all=${allTags} sel=${sel} onToggle=${t=>setSel(sel===t?'':t)} onClear=${()=>setSel('')}/>
    ${shown.length===0 && html`<div class="empty">Noch keine Notizen${sel?' mit #'+sel:''}. Leg oben eine an. 📝</div>`}
    ${shown.map(n => html`<div class=${'note'+(n.pinned?' pin':'')} key=${n.id} data-testid="note-item">
      ${editId===n.id ? html`
        <input value=${n.title} onInput=${e=>{n.title=e.target.value;setNotes([...notes]);}}/>
        <textarea style="width:100%;min-height:70px;margin-top:6px" value=${n.body} onInput=${e=>{n.body=e.target.value;setNotes([...notes]);}}></textarea>
        <div class="acts" style="margin-top:8px"><button class="btn sm primary" onClick=${()=>saveEdit(n)}>💾 Speichern</button><button class="btn sm" onClick=${()=>{setEditId(0);load();}}>Abbrechen</button></div>
      ` : html`
        <h3>${n.pinned?'📌 ':''}${n.title||'(ohne Titel)'}</h3>
        ${n.body && html`<div class="body">${n.body}</div>`}
        <div class="foot">
          <div class="tags">${(n.tags||[]).map(t=>html`<span class="tag" onClick=${()=>setSel(t)}>#${t}</span>`)}</div>
          <div class="acts">
            <button class="btn sm" onClick=${()=>svc.updateNote(n.id,{pinned:!n.pinned}).then(load)} title="Anpinnen">${n.pinned?'📌':'📍'}</button>
            <button class="btn sm" onClick=${()=>setEditId(n.id)}>✏️</button>
            <button class="btn sm danger" onClick=${()=>{ if(confirm('Notiz löschen?')) svc.deleteNote(n.id).then(load); }}>🗑️</button>
          </div>
        </div>`}
    </div>`)}
  </div>`;
}

function Aufgaben({ svc }){
  const [tasks,setTasks]=useState([]);
  const [title,setTitle]=useState(''); const [due,setDue]=useState(''); const [tagsIn,setTagsIn]=useState('');
  const [sel,setSel]=useState(''); const [showDone,setShowDone]=useState(true);
  const load=useCallback(()=>{ svc.listTasks().then(setTasks).catch(e=>toast(e.message)); },[svc]);
  useEffect(()=>{ load(); },[load]);
  const allTags=useMemo(()=>{ const s=new Set(); tasks.forEach(n=>(n.tags||[]).forEach(t=>s.add(t))); return Array.from(s).sort(); },[tasks]);
  const shown=useMemo(()=> tasks.filter(t=>(!sel||(t.tags||[]).includes(sel)) && (showDone||!t.done)),[tasks,sel,showDone]);
  const add=()=>{ if(!title.trim()){ toast('Bitte Aufgabe eingeben'); return; }
    const tags=extractTags(title,tagsIn);
    svc.addTask({ title:title.trim(), due:due||null, tags }).then(()=>{ setTitle('');setDue('');setTagsIn(''); toast('Aufgabe hinzugefügt ✓'); load(); }).catch(e=>toast(e.message)); };
  return html`<div>
    <div class="addcard">
      <input placeholder="Neue Aufgabe … (#tags möglich)" value=${title} onInput=${e=>setTitle(e.target.value)} data-testid="task-title" onKeyDown=${e=>e.key==='Enter'&&add()}/>
      <div class="addrow">
        <input type="date" value=${due} onInput=${e=>setDue(e.target.value)} data-testid="task-due" style="max-width:170px"/>
        <input placeholder="Tags (optional)" value=${tagsIn} onInput=${e=>setTagsIn(e.target.value)} data-testid="task-tags"/>
        <button class="btn primary" onClick=${add} data-testid="task-add">＋ Aufgabe</button>
      </div>
    </div>
    <div class="filterbar">
      <label style="font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px">
        <input type="checkbox" checked=${showDone} onChange=${e=>setShowDone(e.target.checked)} style="width:18px;height:18px"/> Erledigte zeigen
      </label>
    </div>
    <${TagBar} all=${allTags} sel=${sel} onToggle=${t=>setSel(sel===t?'':t)} onClear=${()=>setSel('')}/>
    ${shown.length===0 && html`<div class="empty">Keine Aufgaben${sel?' mit #'+sel:''}. 🎉</div>`}
    ${shown.map(t => html`<div class=${'task'+(t.done?' done':'')} key=${t.id} data-testid="task-item">
      <input type="checkbox" checked=${t.done} onChange=${()=>svc.updateTask(t.id,{done:!t.done}).then(load)} data-testid="task-check"/>
      <div class="main">
        <div class="ttl">${t.title}</div>
        <div class="meta">
          ${t.due && html`<span class=${'due'+(isOverdue(t.due)&&!t.done?' over':'')}>📅 ${fmtDate(t.due)}</span>`}
          ${(t.tags||[]).map(tg=>html`<span class="tag" style="min-height:26px;padding:2px 8px" onClick=${()=>setSel(tg)}>#${tg}</span>`)}
        </div>
      </div>
      <button class="btn sm danger" onClick=${()=>{ if(confirm('Aufgabe löschen?')) svc.deleteTask(t.id).then(load); }}>🗑️</button>
    </div>`)}
  </div>`;
}

function App(){
  const [svc,setSvc]=useState(null);
  const [tab,setTab]=useState('notizen');
  const [authState,setAuthState]=useState('loading'); // loading | ok | login
  const [who,setWho]=useState('');
  const [email,setEmail]=useState(''); const [pw,setPw]=useState('');

  useEffect(()=>{ (async()=>{
    if(DEMO){ const s=makeDemoService(); setSvc(s); const ses=await s.session(); setWho(ses.user.email); setAuthState('ok'); return; }
    try{
      const s=await makeSupabaseService(); setSvc(s);
      const ses=await s.session();
      if(ses && ses.user){ setWho(ses.user.email||''); setAuthState('ok'); }
      else setAuthState('login');
    }catch(e){ toast('Verbindung fehlgeschlagen'); setAuthState('login'); }
  })(); },[]);

  const doLogin=async()=>{ try{ await svc.signIn(email.trim(), pw); const ses=await svc.session(); setWho(ses.user.email||''); setAuthState('ok'); }catch(e){ toast(e.message||'Login fehlgeschlagen'); } };

  if(authState==='loading') return html`<div class="empty" style="padding-top:60px">Lädt …</div>`;
  if(authState==='login') return html`<div class="login">
    <h2>🔑 Anmelden</h2>
    <p>Melde dich mit deiner Schul-E-Mail an — oder öffne Notizen direkt aus Hub/Connect (dann bist du schon angemeldet).</p>
    <input placeholder="E-Mail" value=${email} onInput=${e=>setEmail(e.target.value)} data-testid="login-email"/>
    <input type="password" placeholder="Passwort" value=${pw} onInput=${e=>setPw(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&doLogin()} data-testid="login-pw"/>
    <button class="btn primary" style="width:100%" onClick=${doLogin} data-testid="login-btn">Anmelden</button>
  </div>`;

  return html`<div>
    <div class="top">
      <h1>📝 Notizen & Aufgaben</h1>
      <div class="who">Persönlich · nur du siehst das${who?' · '+who:''}</div>
      <div class="tabs" role="tablist">
        <button class=${tab==='notizen'?'on':''} onClick=${()=>setTab('notizen')} data-testid="tab-notizen">📝 Notizen</button>
        <button class=${tab==='aufgaben'?'on':''} onClick=${()=>setTab('aufgaben')} data-testid="tab-aufgaben">✅ Aufgaben</button>
      </div>
    </div>
    <div class="wrap">
      ${tab==='notizen' ? html`<${Notizen} svc=${svc}/>` : html`<${Aufgaben} svc=${svc}/>`}
    </div>
    ${DEMO && html`<div class="demo-pill">DEMO</div>`}
  </div>`;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
