<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KRS Notizen & Aufgaben</title>
<style>
  /* v2.0 (10.07.2026): Redesign nach Vorbild Things / Apple Notes —
     Suche, Tag-Filter, Aufgaben-Gruppen, Karten-Grid, +-Button statt Dauerformular */
  :root{--accent:#2563eb;--accent2:#1d4ed8;--ink:#1c1c1e;--muted:#8a8a8e;--bg:#f7f7f9;--card:#fff;
    --line:#ececf0;--green:#28a745;--amber:#d97706;--danger:#dc2626;--radius:14px;
    --shadow:0 1px 2px rgba(0,0,0,.05),0 4px 14px rgba(0,0,0,.04);
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font:15px/1.5 var(--font);color:var(--ink);background:var(--bg);min-height:100vh;min-height:100dvh}
  button{font:inherit;cursor:pointer;-webkit-tap-highlight-color:transparent}
  input,textarea{font:inherit;color:var(--ink)}

  /* ── Kopf: ruhig & hell (Apple-Notes-artig) ── */
  .top{background:rgba(255,255,255,.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);padding:14px 16px 10px;position:sticky;top:0;z-index:30}
  .top-inner{max-width:860px;margin:0 auto}
  .top h1{font-size:22px;font-weight:800;letter-spacing:-.02em}
  .top .who{font-size:12px;color:var(--muted);margin-top:1px}
  .tabs{display:flex;gap:2px;background:#ececf0;border-radius:10px;padding:3px;margin-top:10px;max-width:340px}
  .tabs button{flex:1;border:none;background:none;color:var(--ink);padding:7px;border-radius:8px;font-weight:600;min-height:38px;font-size:14px}
  .tabs button.on{background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12)}
  .searchrow{position:relative;margin-top:10px}
  .searchrow .ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none}
  .search{width:100%;border:none;background:#ececf0;border-radius:11px;padding:10px 36px;font-size:15px;outline:none}
  .search:focus{background:#e4e4ea}
  .search-clear{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:none;background:none;color:var(--muted);font-size:15px;padding:6px 8px;border-radius:50%}

  .wrap{max-width:860px;margin:0 auto;padding:14px 12px 110px}

  /* ── Tag-Chips: horizontal scrollbar ── */
  .filterbar{display:flex;gap:6px;align-items:center;margin:2px 0 14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .filterbar::-webkit-scrollbar{display:none}
  .tag{display:inline-flex;align-items:center;gap:4px;border:none;background:#ececf0;color:#3a3a3c;white-space:nowrap;
    border-radius:16px;padding:6px 12px;font-size:13px;min-height:32px;font-weight:500}
  .tag.sel{background:var(--accent);color:#fff}
  .tag.clear{color:var(--danger);background:#fdecec}
  .tag.mini{min-height:24px;padding:2px 9px;font-size:12px;background:#f1f1f5;color:var(--muted)}

  /* ── Gruppen-Überschriften (Things-artig) ── */
  .sect{display:flex;align-items:center;gap:8px;margin:18px 2px 8px;font-size:13px;font-weight:700;color:var(--muted);
    text-transform:uppercase;letter-spacing:.04em}
  .sect .cnt{background:#ececf0;border-radius:10px;padding:0 8px;font-size:11px;line-height:18px;font-weight:700}
  .sect.over{color:var(--danger)} .sect.today{color:var(--amber)}

  /* ── Notizen: Karten-Grid ── */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px}
  .note{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;gap:6px;cursor:pointer;transition:transform .12s, box-shadow .12s}
  .note:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.08)}
  .note.pin{background:#fffdf2;border-color:#f3e3a4}
  .note h3{font-size:15.5px;letter-spacing:-.01em;display:flex;align-items:flex-start;gap:6px}
  .note .body{font-size:13.5px;color:#48484a;white-space:pre-wrap;word-break:break-word;
    display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
  .note.editing{cursor:auto;grid-column:1 / -1}
  .note .foot{display:flex;justify-content:space-between;align-items:flex-end;gap:8px;margin-top:auto;padding-top:6px;flex-wrap:wrap}
  .note .tags{display:flex;gap:5px;flex-wrap:wrap}
  .note .date{font-size:11.5px;color:var(--muted)}
  .note .acts{display:flex;gap:2px}
  .iconbtn{border:none;background:none;font-size:15px;padding:6px;border-radius:8px;min-width:32px;min-height:32px;line-height:1}
  .iconbtn:hover{background:#ececf0}

  /* ── Aufgaben: Things-artige Zeilen mit runden Checkboxen ── */
  .task{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:7px;
    display:flex;gap:11px;align-items:flex-start;box-shadow:var(--shadow)}
  .task input[type=checkbox]{appearance:none;-webkit-appearance:none;width:23px;height:23px;margin-top:1px;flex:0 0 auto;
    border:1.8px solid #c7c7cc;border-radius:50%;cursor:pointer;position:relative;transition:all .15s;background:#fff}
  .task input[type=checkbox]:checked{background:var(--green);border-color:var(--green)}
  .task input[type=checkbox]:checked::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;font-weight:800}
  .task .main{flex:1;min-width:0}
  .task .ttl{font-weight:500;font-size:14.5px}
  .task.done{opacity:.55} .task.done .ttl{text-decoration:line-through;color:var(--muted)}
  .task .meta{font-size:12px;color:var(--muted);margin-top:3px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .chip{display:inline-flex;align-items:center;gap:3px;border-radius:10px;padding:1px 8px;font-size:11.5px;font-weight:600;background:#f1f1f5;color:var(--muted)}
  .chip.today{background:#fef3c7;color:#92400e} .chip.over{background:#fdecec;color:var(--danger)}
  .donetoggle{width:100%;border:none;background:none;color:var(--muted);font-size:13px;font-weight:600;padding:10px;border-radius:10px;margin-top:6px}
  .donetoggle:hover{background:#ececf0}

  /* ── Composer: kommt per ＋-Button (Things-Quick-Entry-artig) ── */
  .addcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin-bottom:16px;box-shadow:0 6px 22px rgba(0,0,0,.10)}
  .addcard input,.addcard textarea{width:100%;border:none;border-bottom:1px solid var(--line);border-radius:0;padding:9px 2px;font-size:15px;margin-bottom:6px;outline:none;background:transparent}
  .addcard input:focus,.addcard textarea:focus{border-bottom-color:var(--accent)}
  .addcard textarea{resize:vertical;min-height:64px;border:none;font-size:14px}
  .addrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:4px}
  .addrow input{flex:1;min-width:120px;margin-bottom:0;font-size:13.5px}
  .addrow input[type=date]{flex:0 0 auto;max-width:170px}
  .btn{min-height:42px;padding:0 16px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:600}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{background:var(--accent2)}
  .btn.sm{min-height:34px;padding:0 12px;font-size:13px;font-weight:500}
  .btn.danger{color:var(--danger);border-color:#f6caca}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}

  /* ── ＋ FAB unten rechts ── */
  .fab{position:fixed;right:18px;bottom:calc(18px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:50%;
    border:none;background:var(--accent);color:#fff;font-size:28px;line-height:1;box-shadow:0 6px 18px rgba(37,99,235,.4);z-index:40;
    display:flex;align-items:center;justify-content:center;transition:transform .15s}
  .fab:hover{transform:scale(1.06)} .fab.open{transform:rotate(45deg);background:#64748b;box-shadow:0 6px 18px rgba(0,0,0,.25)}

  .empty{text-align:center;color:var(--muted);padding:44px 10px 30px;font-size:14px}
  .empty .big{font-size:40px;margin-bottom:8px}
  .login{max-width:340px;margin:40px auto;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
  .login h2{font-size:17px;margin-bottom:6px}.login p{font-size:13px;color:var(--muted);margin-bottom:14px}
  .login input{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font:14px var(--font);margin-bottom:8px}
  .toast{position:fixed;left:50%;bottom:86px;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:10px 18px;border-radius:22px;font-size:14px;z-index:100;opacity:0;transition:opacity .2s;pointer-events:none}
  .toast.on{opacity:1}
  .demo-pill{position:fixed;left:10px;bottom:10px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:14px;padding:3px 10px;font-size:11px;font-weight:700;z-index:40}
  mark{background:#fff3b0;border-radius:3px;padding:0 1px}
</style>
</head>

function toast(t){ const el=document.getElementById('toast'); el.textContent=t; el.classList.add('on'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('on'),1800); }

// #hashtags aus Text ziehen + mit manuellen Tags mischen, normalisiert
function extractTags(text, manual){
  const out = new Set();
  (manual||'').split(/[\s,]+/).forEach(t=>{ const s=t.replace(/^#/,'').trim().toLowerCase(); if(s) out.add(s); });
  const re = /#([\p{L}0-9_\-]{1,30})/gu; let m;
  while((m = re.exec(text||''))) out.add(m[1].toLowerCase());
  return Array.from(out);
}
function fmtDate(d){ if(!d) return ''; try{ return new Date(d+'T00:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }catch(e){ return d; } }
function fmtStamp(iso){ if(!iso) return ''; try{ return new Date(iso).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'2-digit'}); }catch(e){ return ''; } }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function isOverdue(d){ if(!d) return false; return d < todayISO(); }
// Volltextsuche über Titel, Text und Tags (case-insensitiv)
function matches(item, q){
  if(!q) return true;
  const s = q.trim().toLowerCase();
  if(!s) return true;
  return (item.title||'').toLowerCase().includes(s)
    || (item.body||'').toLowerCase().includes(s)
    || (item.tags||[]).some(t => ('#'+t).includes(s) || t.includes(s));
}

async function makeSupabaseService(){
  const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
  const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
  return {
    demo:false, sb,
    async session(){ const { data } = await sb.auth.getSession(); return data.session; },
    async signIn(email,pw){ const { error } = await sb.auth.signInWithPassword({ email, password: pw }); if(error) throw error; },
    async listNotes(){ const { data, error } = await sb.from('notes').select('*').order('pinned',{ascending:false}).order('updated_at',{ascending:false}); if(error)throw error; return data||[]; },
    async addNote(n){ const { error } = await sb.from('notes').insert(n); if(error)throw error; },
    async updateNote(id,patch){ const { error } = await sb.from('notes').update(patch).eq('id',id); if(error)throw error; },
    async deleteNote(id){ const { error } = await sb.from('notes').delete().eq('id',id); if(error)throw error; },
    async listTasks(){ const { data, error } = await sb.from('tasks').select('*').order('done',{ascending:true}).order('updated_at',{ascending:false}); if(error)throw error; return data||[]; },
    async addTask(t){ const { error } = await sb.from('tasks').insert(t); if(error)throw error; },
    async updateTask(id,patch){ const { error } = await sb.from('tasks').update(patch).eq('id',id); if(error)throw error; },
    async deleteTask(id){ const { error } = await sb.from('tasks').delete().eq('id',id); if(error)throw error; }
  };
}

function TagBar({ all, sel, onToggle, onClear }){
  if(!all.length) return null;
  return html`<div class="filterbar" data-testid="tagbar">
    ${sel && html`<button class="tag clear" onClick=${onClear}>✕</button>`}
    ${all.map(t => html`<button class=${'tag'+(sel===t?' sel':'')} onClick=${()=>onToggle(t)}>#${t}</button>`)}
  </div>`;
}

function Sect({ label, cls, count }){
  return html`<div class=${'sect'+(cls?' '+cls:'')}>${label}<span class="cnt">${count}</span></div>`;
}

function Notizen({ svc, search, showAdd, closeAdd }){
  const [notes,setNotes]=useState([]);
  const [title,setTitle]=useState(''); const [body,setBody]=useState(''); const [tagsIn,setTagsIn]=useState('');
  const [sel,setSel]=useState(''); const [editId,setEditId]=useState(0);
  const load=useCallback(()=>{ svc.listNotes().then(setNotes).catch(e=>toast(e.message)); },[svc]);
  useEffect(()=>{ load(); },[load]);
  const allTags=useMemo(()=>{ const s=new Set(); notes.forEach(n=>(n.tags||[]).forEach(t=>s.add(t))); return Array.from(s).sort(); },[notes]);
  const shown=useMemo(()=> notes.filter(n => (!sel || (n.tags||[]).includes(sel)) && matches(n, search)),[notes,sel,search]);
  const pinned = shown.filter(n=>n.pinned), rest = shown.filter(n=>!n.pinned);
  const save=()=>{ if(!title.trim()&&!body.trim()){ toast('Bitte Titel oder Text'); return; }
    const tags=extractTags(body,tagsIn);
    svc.addNote({ title:title.trim(), body:body.trim(), tags, pinned:false }).then(()=>{ setTitle('');setBody('');setTagsIn(''); closeAdd(); toast('Notiz gespeichert ✓'); load(); }).catch(e=>toast(e.message)); };
  const saveEdit=(n)=>{ const tags=extractTags(n.body,''); svc.updateNote(n.id,{ title:n.title, body:n.body, tags }).then(()=>{ setEditId(0); toast('Gespeichert'); load(); }).catch(e=>toast(e.message)); };

  const card = (n) => html`<div class=${'note'+(n.pinned?' pin':'')+(editId===n.id?' editing':'')} key=${n.id} data-testid="note-item"
      onClick=${()=>{ if(editId!==n.id) setEditId(n.id); }}>
    ${editId===n.id ? html`
      <input value=${n.title} placeholder="Titel" onClick=${e=>e.stopPropagation()} onInput=${e=>{n.title=e.target.value;setNotes([...notes]);}}
        style="border:none;border-bottom:1px solid var(--line);padding:6px 2px;font-weight:700;font-size:15.5px;outline:none;background:transparent;width:100%"/>
      <textarea style="width:100%;min-height:90px;margin-top:6px;border:1px solid var(--line);border-radius:9px;padding:8px;outline:none" onClick=${e=>e.stopPropagation()}
        value=${n.body} onInput=${e=>{n.body=e.target.value;setNotes([...notes]);}}></textarea>
      <div class="addrow" style="justify-content:flex-end" onClick=${e=>e.stopPropagation()}>
        <button class="btn sm" onClick=${()=>{setEditId(0);load();}}>Abbrechen</button>
        <button class="btn sm primary" onClick=${()=>saveEdit(n)}>Speichern</button>
      </div>
    ` : html`
      <h3>${n.pinned?'📌 ':''}${n.title||'(ohne Titel)'}</h3>
      ${n.body && html`<div class="body">${n.body}</div>`}
      <div class="foot">
        <div class="tags">${(n.tags||[]).map(t=>html`<button class="tag mini" onClick=${e=>{e.stopPropagation();setSel(sel===t?'':t);}}>#${t}</button>`)}</div>
        <div class="acts" onClick=${e=>e.stopPropagation()}>
          <span class="date">${fmtStamp(n.updated_at)}</span>
          <button class="iconbtn" onClick=${()=>svc.updateNote(n.id,{pinned:!n.pinned}).then(load)} title=${n.pinned?'Lösen':'Anpinnen'} aria-label=${n.pinned?'Notiz lösen':'Notiz anpinnen'}>${n.pinned?'📌':'📍'}</button>
          <button class="iconbtn" onClick=${()=>setEditId(n.id)} title="Bearbeiten" aria-label="Notiz bearbeiten">✏️</button>
          <button class="iconbtn" style="color:var(--danger)" onClick=${()=>{ if(confirm('Notiz löschen?')) svc.deleteNote(n.id).then(load); }} title="Löschen" aria-label="Notiz löschen">🗑️</button>
        </div>
      </div>`}
  </div>`;

  return html`<div>
    ${showAdd && html`<div class="addcard" data-testid="note-composer">
      <input placeholder="Titel" value=${title} onInput=${e=>setTitle(e.target.value)} data-testid="note-title" autoFocus/>
      <textarea placeholder="Text … (#tags direkt im Text, z. B. #musik #klasse7a)" value=${body} onInput=${e=>setBody(e.target.value)} data-testid="note-body"></textarea>
      <div class="addrow">
        <input placeholder="Tags (optional, kommagetrennt)" value=${tagsIn} onInput=${e=>setTagsIn(e.target.value)} data-testid="note-tags"/>
        <button class="btn primary" onClick=${save} data-testid="note-add">Sichern</button>
      </div>
    </div>`}
    <${TagBar} all=${allTags} sel=${sel} onToggle=${t=>setSel(sel===t?'':t)} onClear=${()=>setSel('')}/>
    ${shown.length===0 && html`<div class="empty"><div class="big">📝</div>
      ${search||sel ? 'Nichts gefunden'+(sel?' mit #'+sel:'')+(search?' für „'+search+'"':'')+'.' : 'Noch keine Notizen. Tippe unten auf ＋.'}</div>`}
    ${pinned.length>0 && html`<${Sect} label="Angepinnt" count=${pinned.length}/>`}
    ${pinned.length>0 && html`<div class="grid">${pinned.map(card)}</div>`}
    ${pinned.length>0 && rest.length>0 && html`<${Sect} label="Notizen" count=${rest.length}/>`}
    ${rest.length>0 && html`<div class="grid">${rest.map(card)}</div>`}
  </div>`;
}

function Aufgaben({ svc, search, showAdd, closeAdd }){
  const [tasks,setTasks]=useState([]);
  const [title,setTitle]=useState(''); const [due,setDue]=useState(''); const [tagsIn,setTagsIn]=useState('');
  const [sel,setSel]=useState(''); const [showDone,setShowDone]=useState(false);
  const load=useCallback(()=>{ svc.listTasks().then(setTasks).catch(e=>toast(e.message)); },[svc]);
  useEffect(()=>{ load(); },[load]);
  const allTags=useMemo(()=>{ const s=new Set(); tasks.forEach(n=>(n.tags||[]).forEach(t=>s.add(t))); return Array.from(s).sort(); },[tasks]);
  const shown=useMemo(()=> tasks.filter(t=>(!sel||(t.tags||[]).includes(sel)) && matches(t, search)),[tasks,sel,search]);
  const today = todayISO();
  const groups = useMemo(()=>({
    over:    shown.filter(t=>!t.done && t.due && t.due < today),
    today:   shown.filter(t=>!t.done && t.due === today),
    planned: shown.filter(t=>!t.done && t.due && t.due > today),
    someday: shown.filter(t=>!t.done && !t.due),
    done:    shown.filter(t=>t.done),
  }),[shown,today]);
  const add=()=>{ if(!title.trim()){ toast('Bitte Aufgabe eingeben'); return; }
    const tags=extractTags(title,tagsIn);
    svc.addTask({ title:title.trim(), due:due||null, tags }).then(()=>{ setTitle('');setDue('');setTagsIn(''); closeAdd(); toast('Aufgabe hinzugefügt ✓'); load(); }).catch(e=>toast(e.message)); };

  const row = (t) => html`<div class=${'task'+(t.done?' done':'')} key=${t.id} data-testid="task-item">
    <input type="checkbox" checked=${t.done} onChange=${()=>svc.updateTask(t.id,{done:!t.done}).then(load)} data-testid="task-check" aria-label=${'Aufgabe '+(t.done?'reaktivieren':'abhaken')}/>
    <div class="main">
      <div class="ttl">${t.title}</div>
      ${(t.due || (t.tags||[]).length>0) && html`<div class="meta">
        ${t.due && html`<span class=${'chip'+(isOverdue(t.due)&&!t.done?' over':(t.due===today?' today':''))}>📅 ${t.due===today?'Heute':fmtDate(t.due)}</span>`}
        ${(t.tags||[]).map(tg=>html`<button class="tag mini" onClick=${()=>setSel(sel===tg?'':tg)}>#${tg}</button>`)}
      </div>`}
    </div>
    <button class="iconbtn" style="color:var(--danger)" onClick=${()=>{ if(confirm('Aufgabe löschen?')) svc.deleteTask(t.id).then(load); }} title="Löschen" aria-label="Aufgabe löschen">🗑️</button>
  </div>`;

  return html`<div>
    ${showAdd && html`<div class="addcard" data-testid="task-composer">
      <input placeholder="Neue Aufgabe … (#tags möglich)" value=${title} onInput=${e=>setTitle(e.target.value)} data-testid="task-title" onKeyDown=${e=>e.key==='Enter'&&add()} autoFocus/>
      <div class="addrow">
        <input type="date" value=${due} onInput=${e=>setDue(e.target.value)} data-testid="task-due"/>
        <input placeholder="Tags (optional)" value=${tagsIn} onInput=${e=>setTagsIn(e.target.value)} data-testid="task-tags"/>
        <button class="btn primary" onClick=${add} data-testid="task-add">Sichern</button>
      </div>
    </div>`}
    <${TagBar} all=${allTags} sel=${sel} onToggle=${t=>setSel(sel===t?'':t)} onClear=${()=>setSel('')}/>
    ${shown.length===0 && html`<div class="empty"><div class="big">🎉</div>
      ${search||sel ? 'Nichts gefunden'+(sel?' mit #'+sel:'')+(search?' für „'+search+'"':'')+'.' : 'Alles erledigt. Neue Aufgabe: unten ＋.'}</div>`}
    ${groups.over.length>0 && html`<${Sect} label="Überfällig" cls="over" count=${groups.over.length}/>`}
    ${groups.over.map(row)}
    ${groups.today.length>0 && html`<${Sect} label="Heute" cls="today" count=${groups.today.length}/>`}
    ${groups.today.map(row)}
    ${groups.planned.length>0 && html`<${Sect} label="Geplant" count=${groups.planned.length}/>`}
    ${groups.planned.map(row)}
    ${groups.someday.length>0 && html`<${Sect} label="Ohne Termin" count=${groups.someday.length}/>`}
    ${groups.someday.map(row)}
    ${groups.done.length>0 && html`<button class="donetoggle" onClick=${()=>setShowDone(!showDone)} data-testid="done-toggle">
      ${showDone?'▾':'▸'} Erledigt (${groups.done.length})</button>`}
    ${showDone && groups.done.map(row)}
  </div>`;
}

function App(){
  const [svc,setSvc]=useState(null);
  const [tab,setTab]=useState('notizen');
  const [authState,setAuthState]=useState('loading'); // loading | ok | login
  const [who,setWho]=useState('');
  const [email,setEmail]=useState(''); const [pw,setPw]=useState('');
  const [search,setSearch]=useState('');
  const [showAdd,setShowAdd]=useState(false);

  useEffect(()=>{ (async()=>{
    if(DEMO){ const s=makeDemoService(); setSvc(s); const ses=await s.session(); setWho(ses.user.email); setAuthState('ok'); return; }
    try{
      const s=await makeSupabaseService(); setSvc(s);
      const ses=await s.session();
      if(ses && ses.user){ setWho(ses.user.email||''); setAuthState('ok'); }
      else setAuthState('login');
    }catch(e){ toast('Verbindung fehlgeschlagen'); setAuthState('login'); }
  })(); },[]);

  const doLogin=async()=>{ try{ await svc.signIn(email.trim(), pw); const ses=await svc.session(); setWho(ses.user.email||''); setAuthState('ok'); }catch(e){ toast(e.message||'Login fehlgeschlagen'); } };

  if(authState==='loading') return html`<div class="empty" style="padding-top:60px">Lädt …</div>`;
  if(authState==='login') return html`<div class="login">
    <h2>🔑 Anmelden</h2>
    <p>Melde dich mit deiner Schul-E-Mail an — oder öffne Notizen direkt aus Hub/Connect (dann bist du schon angemeldet).</p>
    <input placeholder="E-Mail" value=${email} onInput=${e=>setEmail(e.target.value)} data-testid="login-email"/>
    <input type="password" placeholder="Passwort" value=${pw} onInput=${e=>setPw(e.target.value)} onKeyDown=${e=>e.key==='Enter'&&doLogin()} data-testid="login-pw"/>
    <button class="btn primary" style="width:100%" onClick=${doLogin} data-testid="login-btn">Anmelden</button>
  </div>`;

  const switchTab = (t) => { setTab(t); setShowAdd(false); };

  return html`<div>
    <div class="top">
      <div class="top-inner">
        <h1>${tab==='notizen'?'Notizen':'Aufgaben'}</h1>
        <div class="who">Persönlich · nur du siehst das${who?' · '+who:''}</div>
        <div class="tabs" role="tablist">
          <button class=${tab==='notizen'?'on':''} onClick=${()=>switchTab('notizen')} data-testid="tab-notizen" role="tab" aria-selected=${tab==='notizen'}>📝 Notizen</button>
          <button class=${tab==='aufgaben'?'on':''} onClick=${()=>switchTab('aufgaben')} data-testid="tab-aufgaben" role="tab" aria-selected=${tab==='aufgaben'}>✅ Aufgaben</button>
        </div>
        <div class="searchrow">
          <span class="ico">🔍</span>
          <input class="search" type="search" placeholder=${'Suchen in '+(tab==='notizen'?'Notizen':'Aufgaben')+' … (auch #tags)'}
            value=${search} onInput=${e=>setSearch(e.target.value)} data-testid="search-input" aria-label="Suchen"/>
          ${search && html`<button class="search-clear" onClick=${()=>setSearch('')} aria-label="Suche leeren">✕</button>`}
        </div>
      </div>
    </div>
    <div class="wrap">
      ${tab==='notizen'
        ? html`<${Notizen} svc=${svc} search=${search} showAdd=${showAdd} closeAdd=${()=>setShowAdd(false)}/>`
        : html`<${Aufgaben} svc=${svc} search=${search} showAdd=${showAdd} closeAdd=${()=>setShowAdd(false)}/>`}
    </div>
    <button class=${'fab'+(showAdd?' open':'')} onClick=${()=>setShowAdd(v=>!v)} data-testid="fab-add"
      title=${showAdd?'Schließen':(tab==='notizen'?'Neue Notiz':'Neue Aufgabe')} aria-label=${showAdd?'Eingabe schließen':(tab==='notizen'?'Neue Notiz anlegen':'Neue Aufgabe anlegen')}>＋</button>
    ${DEMO && html`<div class="demo-pill">DEMO</div>`}
  </div>`;
}

render(html`<${App}/>`, document.getElementById('app'));
</script>
</body>
</html>
