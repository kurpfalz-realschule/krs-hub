<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>KRS Hub — Offline</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1e293b;
    color: #f1f5f9;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    padding-top: max(24px, env(safe-area-inset-top));
    padding-bottom: max(24px, env(safe-area-inset-bottom));
    text-align: center;
  }
  .box { max-width: 360px; }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
  p { font-size: 14px; color: #cbd5e1; line-height: 1.5; margin-bottom: 20px; }
  button {
    background: #ea7624;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 22px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    min-height: 44px;
  }
  button:hover { background: #d9661a; }
</style>
</head>
<body>
  <div class="box">
    <div class="icon">📡</div>
    <h1>Keine Verbindung — KRS Hub braucht Internet</h1>
    <p>Diese Seite konnte nicht geladen werden, weil gerade keine Internetverbindung besteht. Sobald du wieder online bist, einfach erneut versuchen.</p>
    <button onclick="location.reload()">Erneut versuchen</button>
  </div>
</body>
</html>
